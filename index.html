<script>
// --- Variabel Utama ---
const table=document.getElementById("jackpotTable");
const title=document.querySelector(".title");
const addRowBtn=document.getElementById("addRow");
const saveBtn=document.getElementById("saveTable");
const deleteRowBtn=document.getElementById("deleteRow");

// --- Popup ---
function showPopup(){ document.getElementById("customPopup").style.display="flex"; }
function closePopup(){ document.getElementById("customPopup").style.display="none"; }

// --- Load Data ---
window.onload=function(){
    const savedTable=localStorage.getItem("savedTableData");
    const savedTitle=localStorage.getItem("savedTitle");
    if(savedTable) table.querySelector("tbody").innerHTML=savedTable;
    if(savedTitle) title.innerText=savedTitle;

    setupBadgeToggle(); // pastikan badge bisa diklik
    lockBadge();
}

// --- Lock Badge agar tidak editable ---
function lockBadge(){
    document.querySelectorAll(".badge").forEach(btn=>{
        btn.setAttribute("contenteditable","false");
        btn.addEventListener("keydown",e=>e.preventDefault());
        btn.addEventListener("dblclick",e=>e.preventDefault());
    });
}

// --- Tambah Baris ---
addRowBtn.addEventListener("click",()=>{
    const tbody=table.querySelector("tbody");
    const newRow=document.createElement("tr");
    newRow.innerHTML=`
    <td contenteditable="true">PG/PRAGMATIC</td>
    <td contenteditable="true">PENDING</td>
    <td contenteditable="true">-</td>
    <td contenteditable="true">VIP</td>
    <td><span class="badge claim-now">CLAIM NOW</span></td>`;
    tbody.appendChild(newRow);
    setupBadgeToggle();
    lockBadge();
});

// --- Hapus Baris ---
deleteRowBtn.addEventListener("click",()=>{
    const tbody=table.querySelector("tbody");
    if(tbody.rows.length>0) tbody.deleteRow(tbody.rows.length-1);
});

// --- Hapus Semua Baris ---
document.getElementById("deleteAllRows").addEventListener("click",()=>{
    const tbody=table.querySelector("tbody");
    tbody.innerHTML="";
});

// --- Save Table ---
saveBtn.addEventListener("click",()=>{
    localStorage.setItem("savedTableData",table.querySelector("tbody").innerHTML);
    localStorage.setItem("savedTitle",title.innerText);
    alert("Data berhasil disimpan!");
});

// --- Toggle Badge ---
function setupBadgeToggle(){
    const badges=table.querySelectorAll(".badge");
    badges.forEach(span=>{
        span.onclick=()=>{
            const txt=span.innerText.trim().toUpperCase();
            if(txt==="CLAIM NOW"){ showPopup(); span.innerText="CLAIMED"; span.className="badge claimed"; }
            else if(txt==="CLAIMED"){ span.innerText="NOT TAKEN"; span.className="badge not-taken"; }
            else{ span.innerText="CLAIM NOW"; span.className="badge claim-now"; }
        };
    });
}

// --- Tambah Nomor Banyak Tanpa CSV ---
document.getElementById("addMultipleNumbers").addEventListener("click",()=>{
    let input=prompt("Masukkan nomor & nama, format: Nama-089xxxx, satu per baris:");
    if(!input) return;
    let lines=input.split("\n");
    const tbody=table.querySelector("tbody");
    lines.forEach(line=>{
        let [name, number]=line.split("-");
        if(!number) number=name.trim(), name="";
        const newRow=document.createElement("tr");
        newRow.innerHTML=`
        <td contenteditable="true">PG/PRAGMATIC</td>
        <td contenteditable="true">PENDING</td>
        <td contenteditable="true">${name ? name+"\n"+number : number}</td>
        <td contenteditable="true">VIP</td>
        <td><span class="badge claim-now">CLAIM NOW</span></td>`;
        tbody.appendChild(newRow);
    });
    setupBadgeToggle();
    lockBadge();
});

// --- Import CSV ---
document.getElementById("importCSV").addEventListener("click",()=>{
    let fileInput=document.createElement("input");
    fileInput.type="file";
    fileInput.accept=".csv";
    fileInput.onchange=(e)=>{
        let file=e.target.files[0];
        let reader=new FileReader();
        reader.onload=function(evt){
            const tbody=table.querySelector("tbody");
            let lines=evt.target.result.split("\n");
            lines.forEach(line=>{
                let cols=line.split(",");
                let number=cols[0].trim();
                const newRow=document.createElement("tr");
                newRow.innerHTML=`
                <td contenteditable="true">PG/PRAGMATIC</td>
                <td contenteditable="true">PENDING</td>
                <td contenteditable="true">${number}</td>
                <td contenteditable="true">VIP</td>
                <td><span class="badge claim-now">CLAIM NOW</span></td>`;
                tbody.appendChild(newRow);
            });
            setupBadgeToggle();
            lockBadge();
        }
        reader.readAsText(file);
    }
    fileInput.click();
});

// --- Klik DATABASE buka WA ---
table.addEventListener("click",(e)=>{
    if(e.target.tagName==="TD" && e.target.cellIndex===2){
        let text=e.target.innerText.replace(/\n/g," ").trim();
        if(text && text!=="-"){
            let number=text.split(" ").pop();
            window.open(`https://wa.me/${number}`,"_blank");
        }
    }
});

// --- Switch Page ---
function switchPage(page){
    const header=document.querySelector(".header");
    const container=document.querySelector(".container");
    const footer=document.querySelector(".footer");
    const page2=document.getElementById("page2");
    if(page===2){
        header.style.display="none";
        container.style.display="none";
        footer.style.display="none";
        page2.style.display="block";
    } else {
        header.style.display="flex";
        container.style.display="block";
        footer.style.display="flex";
        page2.style.display="none";
    }
}
</script>
