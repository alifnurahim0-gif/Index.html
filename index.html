<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terima Kasih</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(270deg, #0f2027, #203a43, #2c5364);
    background-size: 600% 600%;
    animation: bgMove 10s ease infinite;
}

/* Background bergerak */
@keyframes bgMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* Box utama */
.container {
    text-align: center;
    color: white;
    animation: fadeIn 2s ease;
}

/* Animasi muncul */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: scale(0.7);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
}

/* Judul */
h1 {
    font-size: 50px;
    margin-bottom: 20px;
    text-shadow: 0 0 20px cyan;
    animation: glow 2s infinite alternate;
}

/* Efek glow */
@keyframes glow {
    from { text-shadow: 0 0 10px cyan; }
    to { text-shadow: 0 0 30px #00ffff; }
}

/* Deskripsi */
p {
    font-size: 18px;
    margin-bottom: 30px;
}

/* Tombol */
.btn {
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    background: cyan;
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: white;
    transform: scale(1.1);
}

/* Lingkaran animasi */
.circle {
    position: absolute;
    border-radius: 50%;
    background: rgba(0,255,255,0.2);
    animation: float 6s infinite ease-in-out;
}

.circle:nth-child(1) {
    width: 200px;
    height: 200px;
    top: 10%;
    left: 10%;
}

.circle:nth-child(2) {
    width: 150px;
    height: 150px;
    bottom: 10%;
    right: 10%;
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-30px); }
}
</style>

</head>

<body>

<div class="circle"></div>
<div class="circle"></div>

<div class="container">
    <h1>Terima Kasih 🙏</h1>
    <p>Terima kasih sudah mengunjungi website ini.</p>
    <button class="btn" onclick="alert('Sama-sama 😄')">Klik Aku</button>
</div>

</body>
</html>
