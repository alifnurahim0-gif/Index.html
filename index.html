<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Database Jackpot Pejuang Kasino</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat','Inter',sans-serif;}
html,body{touch-action:manipulation;}

.badge{cursor:pointer;padding:6px 14px;border-radius:12px;font-size:11px;font-weight:600;}
.claimed{background:#3e9b8a;color:#001a17;}
.claim-now{background:#4a88ff;color:#00142b;}
.not-taken{background:#b34a4a;color:white;}

body{
background:linear-gradient(180deg,#000000 0%,#000c1a 25%,#001a2e 50%,#002b38 75%,#004644 100%);
color:#e5e5e5;
}

.header{
background: linear-gradient(90deg,#000000,#001c3d,#004c3c);
position: fixed;
top: 0;
left: 0;
width: 100%;
padding: 14px 40px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid rgba(255,255,255,0.15);
z-index: 1000;
}

.logo{display:flex;align-items:center;font-size:24px;font-weight:700;color:#9fdcff;}
.logo span{margin-left:10px;}

.container{
padding: 100px 20px 40px 20px;
}

.title{
font-size:24px;
margin-bottom:25px;
font-weight:700;
color:#9fdcff;
cursor:text;
}

.table-wrapper{
background:linear-gradient(180deg,#000000,#001421,#002430,#00383a);
padding:25px;
border-radius:8px;
border:2px solid rgba(255,255,255,0.10);
overflow-x:auto;
}

table{
width:100%;
min-width:750px;
border-collapse:collapse;
border:2px solid rgba(255,255,255,0.15);
}

thead{
background:linear-gradient(90deg,#001a2e,#004644);
}

thead th{
padding:18px;
font-size:13px;
color:#aee4ff;
}

tbody td{
padding:16px;
font-size:13px;
}

.db-name{
font-weight:600;
}

.db-number{
font-size:15px;
margin-top:2px;
cursor:pointer;
color:#4a88ff;
}

.pagination{
margin-top:20px;
display:flex;
justify-content:center;
gap:8px;
}

.page-btn{
padding:6px 12px;
font-size:12px;
background:#000;
border-radius:6px;
cursor:pointer;
}

.button-wrapper{
margin-top:25px;
display:flex;
gap:10px;
justify-content:flex-end;
flex-wrap:wrap;
}

button{
padding:9px 18px;
font-size:12px;
font-weight:600;
border-radius:6px;
cursor:pointer;
}

#addRow{background:#2e74ff;color:white;}
#saveTable{background:#007c63;color:white;}
#deleteRow{background:#b23d3d;color:white;}
#deleteAll{background:#ff4a4a;color:white;}

.footer{
margin-top:35px;
padding:18px 40px;
font-size:11px;
display:flex;
justify-content:space-between;
border-top:2px solid rgba(255,255,255,0.10);
}

</style>
</head>

<body>

<div class="header">
<div class="logo">👑 <span>PEJUANG KASINO</span></div>
</div>

<div class="container">

<div class="title" contenteditable="true">
DATABASE JACKPOT PEJUANG KASINO
</div>

<div class="table-wrapper">

<table id="jackpotTable">

<thead>
<tr>
<th>Game</th>
<th>Status</th>
<th>DATABASE</th>
<th>Reward</th>
<th>Keterangan</th>
</tr>
</thead>

<tbody>

<tr>
<td contenteditable="true">PG/PRAGMATIC</td>
<td contenteditable="true">DONE</td>

<td>
<div class="db-name" contenteditable="true">Nama</div>
<div class="db-number" onclick="openWhatsApp(this)">85747166188</div>
</td>

<td contenteditable="true">VIP</td>
<td><span class="badge claim-now">CLAIM NOW</span></td>
</tr>

</tbody>

</table>

<div class="button-wrapper">

<button id="addRow">Tambah Baris</button>
<button id="deleteRow">Hapus Baris</button>
<button id="deleteAll">Hapus Semua</button>
<button id="saveTable">Save</button>

</div>

</div>
</div>

<div class="footer">
<div>© 2024 Pejuang Kasino</div>
</div>
<script>

const table = document.getElementById("jackpotTable");
const addRowBtn = document.getElementById("addRow");
const deleteRowBtn = document.getElementById("deleteRow");
const deleteAllBtn = document.getElementById("deleteAll");
const saveBtn = document.getElementById("saveTable");


/* =========================
FITUR BARU AUTO CHAT WHATSAPP
========================= */

function openWhatsApp(element){

const row = element.closest("td");

const name = row.querySelector(".db-name").innerText.trim();
const number = element.innerText.trim();

const message =
`hallo kaa ${name} selamat malam

kenalkan saya Lala dari pejuang kasino, saya asisten pribadi dari rekan saya yang telepon kaka tadi, selanjutnya biar aku bimbing cara daftar dan mainnya ya kak. kaka tinggal ikutin semua yang aku arahkan aja ya kakk🥰`;

const encoded = encodeURIComponent(message);

window.open(`https://wa.me/${number}?text=${encoded}`,'_blank');

}


/* =========================
FITUR LAMA TETAP
========================= */

addRowBtn.onclick = () => {

const tbody = table.querySelector("tbody");

const newRow = document.createElement("tr");

newRow.innerHTML = `
<td contenteditable="true">PG/PRAGMATIC</td>
<td contenteditable="true">PENDING</td>

<td>
<div class="db-name" contenteditable="true">Nama</div>
<div class="db-number" onclick="openWhatsApp(this)">-</div>
</td>

<td contenteditable="true">VIP</td>
<td><span class="badge claim-now">CLAIM NOW</span></td>
`;

tbody.appendChild(newRow);

};


deleteRowBtn.onclick = () => {

const tbody = table.querySelector("tbody");

if(tbody.rows.length>0){
tbody.deleteRow(tbody.rows.length-1);
}

};


deleteAllBtn.onclick = () => {

table.querySelector("tbody").innerHTML = "";

};


saveBtn.onclick = () => {

localStorage.setItem(
"savedTableData",
table.querySelector("tbody").innerHTML
);

};


window.onload = () => {

const saved = localStorage.getItem("savedTableData");

if(saved){
table.querySelector("tbody").innerHTML = saved;
}

};

</script>

</body>
</html>
